# Production deployment — uses pre-built images from GitHub Container Registry.
# Server: 194.87.31.44 (/opt/vpn)
#
# First-time setup:
#   1. Copy .env.prod to /opt/vpn/.env
#   2. Copy tunnel config to /opt/vpn/tunnel-config.json
#   3. docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: vpn-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vpnapp}
      POSTGRES_USER: ${POSTGRES_USER:-vpnapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpnapp"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: vpn-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    image: ghcr.io/abdunabia/vpn-api:latest
    container_name: vpn-api
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-vpnapp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vpnapp}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      STRIPE_KEY: ${STRIPE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_PREMIUM: ${STRIPE_PRICE_PREMIUM:-}
      STRIPE_PRICE_ULTIMATE: ${STRIPE_PRICE_ULTIMATE:-}
      TUNNEL_VLESS_UUID: ${TUNNEL_VLESS_UUID:?Set TUNNEL_VLESS_UUID in .env}
      MIN_APP_VERSION: ${MIN_APP_VERSION:-2.0.0}
      # Telegram recovery bot (ADR-006). All three are optional — the
      # bot goroutine only starts when TELEGRAM_RECOVERY_BOT_TOKEN is
      # non-empty, so deployments that don't need recovery run fine.
      TELEGRAM_RECOVERY_BOT_TOKEN: ${TELEGRAM_RECOVERY_BOT_TOKEN:-}
      TELEGRAM_RECOVERY_BOT_USERNAME: ${TELEGRAM_RECOVERY_BOT_USERNAME:-risevp_bot}
      TELEGRAM_ADMIN_CHAT_ID: ${TELEGRAM_ADMIN_CHAT_ID:-0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  tunnel:
    image: ghcr.io/abdunabia/vpn-tunnel:latest
    container_name: vpn-tunnel
    ports:
      - "443:443"
      # AWG runs on host (not in Docker) for kernel/userspace access
      # - "51820:51820/udp"
    volumes:
      - ./tunnel-config.json:/app/config.json:ro
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    restart: unless-stopped

volumes:
  pgdata:
