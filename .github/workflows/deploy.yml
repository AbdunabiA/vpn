name: Build & Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'infrastructure/**'
      - '.github/workflows/deploy.yml'
      - 'docker-compose.prod.yml'
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Build both API and Tunnel images'
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/abdunabia/vpn

jobs:
  # Detect which services changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api || github.event.inputs.force_all == 'true' }}
      tunnel: ${{ steps.filter.outputs.tunnel || github.event.inputs.force_all == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            api:
              - 'server/api/**'
            tunnel:
              - 'server/tunnel/**'

  # Build and push API image
  build-api:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: server/api
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-api:latest

  # Build and push Tunnel image
  build-tunnel:
    needs: changes
    if: needs.changes.outputs.tunnel == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: server/tunnel
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-tunnel:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-tunnel:latest

  # Deploy to production server
  deploy:
    needs: [changes, build-api, build-tunnel]
    if: |
      always() &&
      needs.build-api.result != 'failure' &&
      needs.build-tunnel.result != 'failure' &&
      (needs.build-api.result == 'success' || needs.build-tunnel.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml,server/api/migrations"
          target: "/opt/vpn"
          strip_components: 0

      - name: Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/vpn

            # Move migrations to expected location
            if [ -d "server/api/migrations" ]; then
              mkdir -p migrations
              cp -r server/api/migrations/* migrations/ 2>/dev/null || true
              rm -rf server/
            fi

            # Login to GHCR
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u abdunabia --password-stdin

            # Pull and restart
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Cleanup
            docker image prune -f

            echo "Deploy complete: $(date)"
