# Full backend development environment
# Run: docker-compose up -d
# Starts: PostgreSQL, Redis, API server, Tunnel server

services:
  # --- Databases ---

  postgres:
    image: postgres:16-alpine
    container_name: vpn-postgres
    environment:
      POSTGRES_DB: vpnapp
      POSTGRES_USER: vpnapp
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../../server/api/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpnapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vpn-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Go Backend Services ---

  api:
    build:
      context: ../../server/api
      dockerfile: Dockerfile
    container_name: vpn-api
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgres://vpnapp:devpassword@postgres:5432/vpnapp?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-change-in-production
      STRIPE_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  tunnel:
    build:
      context: ../../server/tunnel
      dockerfile: Dockerfile
    container_name: vpn-tunnel
    ports:
      - "443:443"
      - "8080:8080"
      # AmneziaWG (WireGuard-based) uses UDP — protocol must be explicit.
      # Ensure your firewall/security group allows inbound UDP 51820 as well.
      - "51820:51820/udp"
    volumes:
      - ../../server/tunnel/config.example.json:/app/config.json:ro
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

  # --- Optional: Nginx WebSocket CDN proxy ---
  # Uncomment to enable VLESS-over-WebSocket transport through Cloudflare CDN.
  #
  # Prerequisites before enabling:
  #   1. A domain pointed at this server with Cloudflare proxy (orange cloud) on.
  #   2. Cloudflare SSL/TLS mode set to "Full".
  #   3. websocket.enabled=true and websocket.port=8443 in tunnel/config.json.
  #   4. Copy server/tunnel/nginx-ws.conf.example to ./nginx/vpn-ws.conf and
  #      replace "vpn.example.com" with your actual CDN domain.
  #
  # nginx:
  #   image: nginx:alpine
  #   container_name: vpn-nginx
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx/vpn-ws.conf:/etc/nginx/conf.d/vpn-ws.conf:ro
  #   depends_on:
  #     - tunnel
  #   restart: unless-stopped

volumes:
  pgdata:
